{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick URL Check - PhishGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        }
        .glass-effect {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .accent-blue {
            color: #3b82f6;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <!-- Navigation -->
    <nav class="glass-effect">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-shield-alt text-3xl accent-blue"></i>
                    <span class="text-2xl font-bold text-white">PhishGuard</span>
                </div>
                <a href="/" class="bg-red-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-red-700 transition-colors">
                    Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-white mb-4">Quick URL Check</h1>
            <p class="text-gray-300 text-lg">
                Enter a URL to quickly check if it's potentially malicious
            </p>
        </div>

        <!-- URL Check Form -->
        <div class="glass-effect rounded-xl p-8">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-white mb-2 flex items-center">
                    <i class="fas fa-link mr-3 accent-blue"></i>
                    Website URL Analysis
                </h2>
                <p class="text-gray-300">
                    Paste the URL you want to analyze for phishing threats
                </p>
            </div>

            <form action="/data" method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label for="url" class="block text-white text-sm font-medium mb-2">Website URL</label>
                    <input 
                        type="url" 
                        id="url" 
                        name="url" 
                        placeholder="https://example.com"
                        required
                        class="w-full px-4 py-4 bg-slate-800 border border-slate-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                    >
                </div>

                <div class="text-center">
                    <button 
                        type="submit" 
                        class="bg-blue-600 text-white px-12 py-4 rounded-lg font-bold text-lg hover:bg-blue-700 transition-colors"
                    >
                        <i class="fas fa-search mr-2"></i>
                        Check URL
                    </button>
                </div>
            </form>

        </div>
    </div>
</body>
</html>
